<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Calvin Mickelson</title>

  <link rel="stylesheet" href="styles.css" />

  <script
    src="https://challenges.cloudflare.com/turnstile/v0/api.js"
    async
    defer>
  </script>
</head>
<body>
  <div id="entry-screen" class="entry-screen">
    <div class="entry-card">
      <h1>Calvin Mickelson</h1>
      <p>Please verify that you are human to enter.</p>

      <div
        class="cf-turnstile"
        data-sitekey="1x00000000000000000000AA"
        data-callback="captchaComplete"
        data-error-callback="captchaError"
        data-expired-callback="captchaExpired">
      </div>

      <p id="entry-message" class="entry-message">
        Complete the check above to enter.
      </p>
    </div>
  </div>

  <main id="home-page" class="home-page hidden">
    <div id="paper-grid" class="paper-grid"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
